name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/emilbroman

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
            web:
              - 'web/**'
              - 'crates/sclc/**'
              - 'crates/sclc-wasm/**'
              - 'crates/ids/**'

  rust-check:
    name: Rust Check & Test
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: nix develop -c cargo fmt --check

      - name: cargo clippy
        run: nix develop -c cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: nix develop -c cargo test --workspace

  web-check:
    name: Web Check
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.node-version
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build WASM
        run: nix develop -c wasm-pack build crates/sclc-wasm --target web --out-dir ../../web/src/lib/sclc-wasm

      - name: web install
        run: npm ci
        working-directory: web

      - name: web biome ci
        run: npx biome ci .
        working-directory: web

      - name: web check
        run: npm run check
        working-directory: web

  # ---------------------------------------------------------------------------
  # Container images (main only)
  # ---------------------------------------------------------------------------
  base-image:
    name: Build base image
    needs: [rust-check]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.rust-check.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dev/Containerfile.skyr
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skyr:latest
            ${{ env.IMAGE_PREFIX }}/skyr:${{ github.sha }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

  service-images:
    name: "Image: skyr-${{ matrix.binary }}"
    needs: [base-image]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.base-image.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        binary:
          - scs
          - de
          - rte
          - api
          - plugin_std_random
          - plugin_std_time
          - plugin_std_artifact
          - plugin_std_crypto
          - plugin_std_container
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dev/Containerfile.service
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/skyr:${{ github.sha }}
            BINARY=${{ matrix.binary }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/skyr-${{ matrix.binary }}:latest
            ${{ env.IMAGE_PREFIX }}/skyr-${{ matrix.binary }}:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Web frontend image (main only)
  # ---------------------------------------------------------------------------
  web-image:
    name: Build web image
    needs: [web-check]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.web-check.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dev/Containerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skyr-web:latest
            ${{ env.IMAGE_PREFIX }}/skyr-web:${{ github.sha }}
          cache-from: type=gha,scope=web-image
          cache-to: type=gha,mode=max,scope=web-image

  # ---------------------------------------------------------------------------
  # CLI binaries (main only)
  # ---------------------------------------------------------------------------
  build-cli:
    name: "CLI: ${{ matrix.target }}"
    needs: [rust-check]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.rust-check.result != 'failure'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: startsWith(matrix.os, 'ubuntu-')

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Add Rust target
        run: nix develop -c rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        if: endsWith(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build CLI
        run: nix develop -c cargo build --release --target ${{ matrix.target }} -p cli

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/skyr dist/skyr-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bin-skyr-${{ matrix.target }}
          path: dist/skyr-${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # scoc binaries (main only)
  # ---------------------------------------------------------------------------
  build-scoc:
    name: "scoc: ${{ matrix.target }}"
    needs: [rust-check]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.rust-check.result != 'failure'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: Swatinem/rust-cache@v2
        with:
          key: scoc-${{ matrix.target }}

      - name: Add Rust target
        run: nix develop -c rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build scoc
        run: nix develop -c cargo build --release --target ${{ matrix.target }} -p scoc

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/scoc dist/scoc-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bin-scoc-${{ matrix.target }}
          path: dist/scoc-${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # GitHub Release (main only)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: [build-cli, build-scoc, base-image, service-images, web-image]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compute version tag
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          date_tag="$(date -u +'%Y.%-m.%-d')"
          echo "tag=v${date_tag}-${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bin-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            Automated release for commit ${{ github.sha }}.

            ### Container Images

            ```
            ghcr.io/emilbroman/skyr:${{ github.sha }}
            ghcr.io/emilbroman/skyr-scs:${{ github.sha }}
            ghcr.io/emilbroman/skyr-de:${{ github.sha }}
            ghcr.io/emilbroman/skyr-rte:${{ github.sha }}
            ghcr.io/emilbroman/skyr-api:${{ github.sha }}
            ghcr.io/emilbroman/skyr-plugin_std_random:${{ github.sha }}
            ghcr.io/emilbroman/skyr-plugin_std_time:${{ github.sha }}
            ghcr.io/emilbroman/skyr-plugin_std_artifact:${{ github.sha }}
            ghcr.io/emilbroman/skyr-plugin_std_crypto:${{ github.sha }}
            ghcr.io/emilbroman/skyr-plugin_std_container:${{ github.sha }}
            ghcr.io/emilbroman/skyr-web:${{ github.sha }}
            ```
          files: artifacts/*
          make_latest: true
