name: skyr

# Region-scoped DNS aliases for Skyr peer services. Skyr binaries resolve
# peers via `<service>.<region>.int.<domain>` (see ids::service_address);
# in this compose stack the region is `local` and the domain is `test`,
# so e.g. `cdb.local.int.test` resolves to the scylla container. The
# original short names (scylla, rabbitmq, redis, redpanda) remain valid for
# tooling that connects directly.
networks:
  default:

services:
  scylla:
    image: scylladb/scylla
    ports:
      - 9042:9042
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      default:
        aliases:
          - cdb.local.int.test
          - gddb.local.int.test
          - rdb.local.int.test
          - sdb.local.int.test

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - 15672:15672
      - 5672:5672
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      default:
        aliases:
          - rtq.local.int.test
          - rq.local.int.test
          - nq.local.int.test

  redis:
    image: redis:8-alpine
    ports:
      - 6379:6379
    restart: always
    networks:
      default:
        aliases:
          - udb.local.int.test
          # SCOC node-registry shares this redis in dev. SCS edges resolve
          # the registry per-region as `node-registry.<region>.int.<domain>`
          # and there's only one region here.
          - node-registry.local.int.test

  ias:
    image: skyr:latest
    entrypoint: ["/ias"]
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "50100",
        "--region",
        "local",
        "--udb-host",
        "redis",
        "--signing-key",
        "/udb-signing.key",
      ]
    environment:
      SKYR_CHALLENGE_SALT: local-dev-challenge-salt
    restart: always
    volumes:
      - ./udb-signing.key:/udb-signing.key:ro
    networks:
      default:
        aliases:
          - ias.local.int.test
    depends_on:
      - redis

  redpanda:
    image: redpandadata/redpanda:v25.3.7
    command:
      [
        "redpanda",
        "start",
        "--kafka-addr",
        "internal://0.0.0.0:9092",
        "--advertise-kafka-addr",
        "internal://ldb.local.int.test:9092",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--check=false",
      ]
    ports:
      - 9092:9092
    restart: always
    networks:
      default:
        aliases:
          - ldb.local.int.test

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    restart: always

  oci-registry:
    image: registry:2
    ports:
      - 5000:5000
    restart: always

  buildkit:
    image: moby/buildkit:latest
    privileged: true
    restart: always
    command:
      - --addr
      - tcp://0.0.0.0:1234
      - --config
      - /etc/buildkit/buildkitd.toml
    ports:
      - 1234:1234
    volumes:
      - ./buildkitd.toml:/etc/buildkit/buildkitd.toml:ro

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - 1025:1025
      - 8025:8025
    restart: always

  api:
    image: skyr:latest
    entrypoint: ["/api"]
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--domain",
        "test",
        "--gddb-bootstrap-region",
        "local",
        "--adb-endpoint-url",
        "http://minio:9000",
        "--adb-external-url",
        "http://localhost:9000",
        "--adb-bucket",
        "skyr-artifacts",
        "--adb-access-key-id",
        "minioadmin",
        "--adb-secret-access-key",
        "minioadmin",
      ]
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - ias

  web:
    image: skyr-web:latest
    environment:
      API_UPSTREAM: api:8080
    restart: always
    ports:
      - 3000:80

  scs:
    image: skyr:latest
    entrypoint: ["/scs"]
    command:
      [
        "daemon",
        "--address",
        "0.0.0.0:2222",
        "--key",
        "/host.pem",
        "--domain",
        "test",
        "--gddb-bootstrap-region",
        "local",
      ]
    restart: always
    ports:
      - 2222:2222
    volumes:
      - ./host.pem:/host.pem:ro

  de-0:
    image: skyr:latest
    entrypoint: ["/de"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--worker-index",
        "0",
        "--worker-count",
        "2",
      ]
    restart: always

  de-1:
    image: skyr:latest
    entrypoint: ["/de"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--worker-index",
        "1",
        "--worker-count",
        "2",
      ]
    restart: always

  plugin-std-random:
    image: skyr:latest
    entrypoint: ["/plugin_std_random"]
    command: ["--bind", "tcp://0.0.0.0:50051"]
    restart: always

  plugin-std-artifact:
    image: skyr:latest
    entrypoint: ["/plugin_std_artifact"]
    command:
      [
        "--bind",
        "tcp://0.0.0.0:50052",
        "--adb-endpoint-url",
        "http://minio:9000",
        "--adb-bucket",
        "skyr-artifacts",
        "--adb-access-key-id",
        "minioadmin",
        "--adb-secret-access-key",
        "minioadmin",
      ]
    restart: always

  plugin-std-crypto:
    image: skyr:latest
    entrypoint: ["/plugin_std_crypto"]
    command: ["--bind", "tcp://0.0.0.0:50055"]
    restart: always

  plugin-std-dns:
    image: skyr:latest
    entrypoint: ["/plugin_std_dns"]
    command:
      [
        "--bind", "tcp://0.0.0.0:50057",
        "--redis-hostname", "redis",
        "--zone", "skyr.local",
        "--dns-port", "5353",
      ]
    ports:
      - 15353:5353/udp
    restart: always

  plugin-std-time:
    image: skyr:latest
    entrypoint: ["/plugin_std_time"]
    command: ["--bind", "tcp://0.0.0.0:50056"]
    restart: always

  plugin-std-http:
    image: skyr:latest
    entrypoint: ["/plugin_std_http"]
    command: ["--bind", "tcp://0.0.0.0:50058"]
    restart: always

  plugin-std-container:
    image: skyr:latest
    entrypoint: ["/plugin_std_container"]
    command:
      [
        "--bind",
        "0.0.0.0:50053",
        # Canonical hostname for orchestrator-originated overlay gossip.
        # Matches the compose service name so SCOCs can resolve + attribute it.
        "--orchestrator-hostname",
        "plugin-std-container",
        "--rtp-bind",
        "tcp://0.0.0.0:50054",
        "--node-registry-hostname",
        "redis",
        "--cdb-hostnames",
        "scylla:9042",
        "--buildkit-addr",
        "tcp://buildkit:1234",
        "--registry-url",
        "http://oci-registry:5000",
        "--insecure-registry",
        "--ldb-hostname",
        "redpanda",
      ]
    restart: always
    volumes:
      - tmpfs:/tmp

  rte-0:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--plugin",
        "Std/Artifact@tcp://plugin-std-artifact:50052",
        "--plugin",
        "Std/Crypto@tcp://plugin-std-crypto:50055",
        "--plugin",
        "Std/DNS@tcp://plugin-std-dns:50057",
        "--plugin",
        "Std/Time@tcp://plugin-std-time:50056",
        "--plugin",
        "Std/Container@tcp://plugin-std-container:50054",
        "--plugin",
        "Std/HTTP@tcp://plugin-std-http:50058",
        "--worker-index",
        "0",
        "--worker-count",
        "3",
      ]
    restart: always

  rte-1:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--plugin",
        "Std/Artifact@tcp://plugin-std-artifact:50052",
        "--plugin",
        "Std/Crypto@tcp://plugin-std-crypto:50055",
        "--plugin",
        "Std/DNS@tcp://plugin-std-dns:50057",
        "--plugin",
        "Std/Time@tcp://plugin-std-time:50056",
        "--plugin",
        "Std/Container@tcp://plugin-std-container:50054",
        "--plugin",
        "Std/HTTP@tcp://plugin-std-http:50058",
        "--worker-index",
        "1",
        "--worker-count",
        "3",
      ]
    restart: always

  rte-2:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--plugin",
        "Std/Artifact@tcp://plugin-std-artifact:50052",
        "--plugin",
        "Std/Crypto@tcp://plugin-std-crypto:50055",
        "--plugin",
        "Std/DNS@tcp://plugin-std-dns:50057",
        "--plugin",
        "Std/Time@tcp://plugin-std-time:50056",
        "--plugin",
        "Std/Container@tcp://plugin-std-container:50054",
        "--plugin",
        "Std/HTTP@tcp://plugin-std-http:50058",
        "--worker-index",
        "2",
        "--worker-count",
        "3",
      ]
    restart: always

  re-0:
    image: skyr:latest
    entrypoint: ["/re"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--worker-index",
        "0",
        "--worker-count",
        "2",
      ]
    restart: always

  re-1:
    image: skyr:latest
    entrypoint: ["/re"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--worker-index",
        "1",
        "--worker-count",
        "2",
      ]
    restart: always

  ne:
    image: skyr:latest
    entrypoint: ["/ne"]
    command:
      [
        "daemon",
        "--region",
        "local",
        "--domain",
        "test",
        "--dedup-hostname",
        "redis",
        "--smtp-host",
        "mailhog",
        "--smtp-port",
        "1025",
        "--smtp-tls",
        "none",
        "--smtp-from",
        "skyr@localhost",
      ]
    restart: always

  scoc-1:
    image: skyr-scoc:latest
    privileged: true
    environment:
      - SCOC_NODE_NAME=scoc-1
      - SCOC_REGION=local
      - SCOC_BIND=0.0.0.0:50054
      - SCOC_CONDUIT_ADDRESS=http://scoc-1:50054
      - SCOC_ORCHESTRATOR_ADDRESS=http://plugin-std-container:50053
      - SCOC_LDB_BROKERS=redpanda:9092
    restart: always
    depends_on:
      - plugin-std-container

  scoc-2:
    image: skyr-scoc:latest
    privileged: true
    environment:
      - SCOC_NODE_NAME=scoc-2
      - SCOC_REGION=local
      - SCOC_BIND=0.0.0.0:50054
      - SCOC_CONDUIT_ADDRESS=http://scoc-2:50054
      - SCOC_ORCHESTRATOR_ADDRESS=http://plugin-std-container:50053
      - SCOC_LDB_BROKERS=redpanda:9092
    restart: always
    depends_on:
      - plugin-std-container

  scoc-3:
    image: skyr-scoc:latest
    privileged: true
    environment:
      - SCOC_NODE_NAME=scoc-3
      - SCOC_REGION=local
      - SCOC_BIND=0.0.0.0:50054
      - SCOC_CONDUIT_ADDRESS=http://scoc-3:50054
      - SCOC_ORCHESTRATOR_ADDRESS=http://plugin-std-container:50053
      - SCOC_LDB_BROKERS=redpanda:9092
    restart: always
    depends_on:
      - plugin-std-container

volumes:
  tmpfs:
