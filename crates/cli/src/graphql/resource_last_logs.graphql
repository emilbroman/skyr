query ResourceLastLogs($organization: String!, $repository: String!, $amount: Int) {
  organization(name: $organization) {
    repository(name: $repository) {
      name
      environments {
        name
        qid
        resources {
          type
          name
          lastLogs(amount: $amount) {
            severity
            timestamp
            message
          }
        }
      }
    }
  }
}
