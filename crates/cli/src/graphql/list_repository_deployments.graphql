query ListRepositoryDeployments {
  repositories {
    name
    environments {
      name
      qid
      deployments {
        id
        ref
        commit {
          hash
        }
        createdAt
        state
        resources {
          type
          name
          inputs
          outputs
          dependencies {
            type
            name
          }
        }
      }
    }
  }
}
