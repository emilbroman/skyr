query ListRepositoryDeployments($organization: String!, $repository: String!) {
  organization(name: $organization) {
    repository(name: $repository) {
      name
      environments {
        name
        qid
        deployments {
          id
          commit {
            hash
          }
          createdAt
          state
          resources {
            type
            name
            inputs
            outputs
            dependencies {
              type
              name
            }
          }
        }
      }
    }
  }
}
