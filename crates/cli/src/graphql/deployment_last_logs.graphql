query DeploymentLastLogs($organization: String!, $repository: String!, $amount: Int) {
  organization(name: $organization) {
    repository(name: $repository) {
      name
      environments {
        name
        qid
        deployments {
          qid
          state
          lastLogs(amount: $amount) {
            severity
            timestamp
            message
          }
        }
      }
    }
  }
}
