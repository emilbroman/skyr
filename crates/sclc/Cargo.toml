[package]
name = "sclc"
version = "0.1.0"
edition = "2024"

[dependencies]
thiserror = "2.0.18"
ids = { path = "../ids" }
cdb = { path = "../cdb" }
serde = { version = "1.0.228", features = ["derive"] }
