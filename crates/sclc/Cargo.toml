unicode-segmentation = "1.12.0"
peg = "0.8.4"
tokio = { version = "1.49.0", features = ["sync"] }
ordered-float = { version = "4.2.0", features = ["serde"] }
chrono = "0.4.44"

[lints]
workspace = true
