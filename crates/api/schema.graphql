schema {
  query: Query
  mutation: Mutation
}

enum DeploymentState {
  DOWN
  UNDESIRED
  LINGERING
  DESIRED
}

scalar JSON

type AuthSuccess {
  user: User!
  token: String!
}

type Deployment {
  ref: String!
  commit: String!
  createdAt: String!
  state: DeploymentState!
  resources: [Resource!]!
}

type Mutation {
  createRepository(organization: String!, repository: String!): Repository!
  signup(username: String!, email: String!, pubkey: String!, signature: String!): AuthSuccess!
  signin(username: String!, signature: String!, pubkey: String!): AuthSuccess!
}

type Query {
  health: Boolean!
  me: User!
  authChallenge(username: String!): String!
  repositories: [Repository!]!
}

type Repository {
  name: String!
  deployments: [Deployment!]!
  resources: [Resource!]!
}

type Resource {
  type: String!
  id: String!
  inputs: JSON
  outputs: JSON
  owner: Deployment
  dependencies: [Resource!]!
}

type User {
  username: String!
  email: String!
  fullname: String
}
