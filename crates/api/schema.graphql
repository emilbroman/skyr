schema {
  query: Query
  mutation: Mutation
}

enum DeploymentState {
  DOWN
  UNDESIRED
  LINGERING
  DESIRED
}

type AuthSuccess {
  user: User!
  token: String!
}

type Deployment {
  state: DeploymentState!
}

type Mutation {
  createRepository(organization: String!, repository: String!): Repository!
  signup(username: String!, email: String!, pubkey: String!, signature: String!): AuthSuccess!
  signin(username: String!, signature: String!, pubkey: String!): AuthSuccess!
}

type Query {
  health: Boolean!
  me: User!
  authChallenge(username: String!): String!
  repositories: [Repository!]!
}

type Repository {
  name: String!
  deployments: [Deployment!]!
}

type User {
  username: String!
  email: String!
  fullname: String
}
