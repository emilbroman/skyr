schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

enum DeploymentState {
  DOWN
  UNDESIRED
  LINGERING
  DESIRED
}

"""
  UI-friendly rolled-up health enum, computed from the underlying counters
  in [`StatusSummary`]:

  - `Healthy` iff `openIncidentCount == 0`
  - `Down` iff `worstOpenCategory == Crash`
  - `Degraded` otherwise
"""
enum HealthStatus {
  HEALTHY
  DEGRADED
  DOWN
}

"""
  Producer-classified failure category. Mirrors [`sdb::Category`] /
  [`rq::IncidentCategory`].
"""
enum IncidentCategory {
  BAD_CONFIGURATION
  CANNOT_PROGRESS
  INCONSISTENT_STATE
  SYSTEM_ERROR
  CRASH
}

enum ResourceMarker {
  VOLATILE
  STICKY
}

enum Severity {
  INFO
  WARNING
  ERROR
}

scalar JSON

type Artifact {
  name: String!
  mediaType: String!
  url: String!
}

type AuthChallenge {
  challenge: String!
  taken: Boolean!
  passkeyRegistration: JSON!
  passkeySignin: JSON
}

type AuthSuccess {
  user: SignedInUser!
  token: String!
}

type Blob {
  hash: String!
  name: String
  size: Int!
  content: String
}

type Commit {
  hash: String!
  message: String!
  parents: [Commit!]!
  tree: Tree!
  treeEntry(path: String!): TreeEntry
}

type Deployment {
  id: String!
  ref: String!
  commit: Commit!
  createdAt: String!
  state: DeploymentState!
  bootstrapped: Boolean!
  failures: Int!
  nonce: String!
  """
    Per-deployment health rollup. **Self-only** — does not aggregate child
    resource health. Resource statuses are reached via
    `Deployment.resources -> Resource.status`.
  """
  status: StatusSummary!
  "Incidents scoped to this deployment (newest first)."
  incidents(entityQid: String, category: IncidentCategory, openOnly: Boolean, since: String, until: String, limit: Int, offset: Int): [Incident!]!
  resources: [Resource!]!
  lastLogs(amount: Int): [Log!]!
}

type Environment {
  name: String!
  qid: String!
  deployment(id: String!): Deployment!
  deployments: [Deployment!]!
  resource(id: String!): Resource
  resources: [Resource!]!
  lastLogs(amount: Int): [Log!]!
  artifacts: [Artifact!]!
  "Incidents scoped to this environment (newest first)."
  incidents(entityQid: String, category: IncidentCategory, openOnly: Boolean, since: String, until: String, limit: Int, offset: Int): [Incident!]!
}

type Incident {
  id: ID!
  entityQid: String!
  category: IncidentCategory!
  openedAt: String!
  closedAt: String
  lastReportAt: String!
  reportCount: Int!
  lastErrorMessage: String
  triggeringReportSummary: String
  "Back-edge to the owning organization. Always populated."
  organization: Organization
  """
    Back-edge to the owning repository. Always populated when the entity
    QID is parseable.
  """
  repository: Repository
  """
    Back-edge to the owning environment. Always populated when the entity
    QID is parseable. Note that the environment object is constructed from
    the deployments currently in CDB; if there are no deployments left the
    returned `Environment` will have an empty `deployments` list.
  """
  environment: Environment
  """
    Back-edge to the owning deployment. Populated only for incidents about
    deployments. `null` for resource-scoped incidents.
  """
  deployment: Deployment
  """
    Back-edge to the owning resource. Populated only for incidents about
    resources. `null` for deployment-scoped incidents. The resource may
    have been destroyed since the incident was opened, in which case this
    resolves to `null`.
  """
  resource: Resource
}

type Log {
  severity: Severity!
  timestamp: String!
  message: String!
}

type Mutation {
  createRepository(organization: String!, repository: String!): Repository!
  signup(username: String!, email: String!, proof: JSON!, fullname: String): AuthSuccess!
  updateFullname(fullname: String!): SignedInUser!
  addPublicKey(proof: JSON!): SignedInUser!
  removePublicKey(fingerprint: String!): SignedInUser!
  signin(username: String!, proof: JSON!): AuthSuccess!
  createOrganization(name: String!): Organization!
  addOrganizationMember(organization: String!, username: String!): Organization!
  leaveOrganization(organization: String!): Boolean!
  """
    Create a new deployment for the given commit hash and make it
    `Desired`, superseding whichever deployment is currently active
    in the same environment.

    Requires the caller to be a member of the owning organisation (the
    same access level as other repository-scoped operations).
  """
  createDeployment(organization: String!, repository: String!, environment: String!, commitHash: String!): Deployment!
  """
    Tear down an environment by transitioning all currently-`Desired`
    deployments to `Undesired` without superseding them.  This mirrors
    the behaviour of deleting a Git ref via SCS.

    Requires the caller to be a member of the owning organisation.
  """
  tearDownEnvironment(organization: String!, repository: String!, environment: String!): Boolean!
  """
    Manually request the deletion of a single resource.  Publishes a
    `Destroy` message to RTQ that the RTE worker pool will consume and
    forward to the resource's plugin.  The RDB row is cleared on the
    plugin's success; on failure the row remains and the failure is
    visible in the resource's log stream.

    This is an imperative action intended as an escape hatch.  The
    declarative model still applies: if the owning deployment is still
    `Desired` and the resource is part of its current evaluation, the
    deployment engine will recreate the resource on its next tick.

    Requires the caller to be a member of the owning organisation (the
    same access level as other repository-scoped mutations).
  """
  deleteResource(organization: String!, repository: String!, environment: String!, resource: String!): Boolean!
}

type Organization {
  name: String!
  members: [User!]!
  repository(name: String!): Repository!
  repositories: [Repository!]!
  "Incidents scoped to this organization (newest first)."
  incidents(entityQid: String, category: IncidentCategory, openOnly: Boolean, since: String, until: String, limit: Int, offset: Int): [Incident!]!
  """
    Look up a single incident by id, scoped to this organization. Returns
    `None` if no such incident exists, or if it exists but does not belong
    to this organization (ACL via scope traversal).
  """
  incident(id: ID!): Incident
}

type Query {
  health: Boolean!
  me: SignedInUser!
  authChallenge(username: String!): AuthChallenge!
  refreshToken: AuthSuccess!
  organizations: [Organization!]!
  organization(name: String!): Organization!
  repositories: [Repository!]!
}

type Repository {
  organization: Organization!
  name: String!
  environment(name: String!): Environment!
  commit(hash: String!): Commit!
  environments: [Environment!]!
  "Incidents scoped to this repository (newest first)."
  incidents(entityQid: String, category: IncidentCategory, openOnly: Boolean, since: String, until: String, limit: Int, offset: Int): [Incident!]!
}

type Resource {
  type: String!
  name: String!
  inputs: JSON
  outputs: JSON
  owner: Deployment
  dependencies: [Resource!]!
  markers: [ResourceMarker!]!
  sourceTrace: [SourceFrame!]!
  lastLogs(amount: Int): [Log!]!
  "Per-resource health rollup."
  status: StatusSummary!
  "Incidents scoped to this resource (newest first)."
  incidents(entityQid: String, category: IncidentCategory, openOnly: Boolean, since: String, until: String, limit: Int, offset: Int): [Incident!]!
}

type SignedInUser {
  username: String!
  email: String!
  fullname: String
  publicKeys: [String!]!
}

type SourceFrame {
  moduleId: String!
  span: String!
  name: String!
}

type StatusSummary {
  "UI-friendly rolled-up health enum."
  health: HealthStatus!
  lastReportAt: String!
  lastReportSucceeded: Boolean!
  openIncidentCount: Int!
  worstOpenCategory: IncidentCategory
  consecutiveFailureCount: Int!
}

type Subscription {
  deploymentLogs(deploymentId: String!, initialAmount: Int): Log!
  environmentLogs(environmentQid: String!, initialAmount: Int): Log!
  resourceLogs(resourceQid: String!, initialAmount: Int): Log!
}

type Tree {
  hash: String!
  name: String
  entries: [TreeEntry!]!
}

type User {
  username: String!
  email: String!
  fullname: String
}

union TreeEntry = Blob | Tree
