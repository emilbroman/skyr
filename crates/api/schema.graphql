schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

enum DeploymentState {
  DOWN
  UNDESIRED
  LINGERING
  DESIRED
}

enum Severity {
  INFO
  WARNING
  ERROR
}

scalar JSON

type Artifact {
  namespace: String!
  name: String!
  mediaType: String!
  url: String!
}

type AuthSuccess {
  user: User!
  token: String!
}

type Deployment {
  id: String!
  ref: String!
  commit: String!
  createdAt: String!
  state: DeploymentState!
  resources: [Resource!]!
  artifacts: [Artifact!]!
  lastLogs(amount: Int): [Log!]!
}

type Log {
  severity: Severity!
  timestamp: String!
  message: String!
}

type Mutation {
  createRepository(organization: String!, repository: String!): Repository!
  signup(username: String!, email: String!, pubkey: String!, signature: String!): AuthSuccess!
  signin(username: String!, signature: String!, pubkey: String!): AuthSuccess!
}

type Query {
  health: Boolean!
  me: User!
  authChallenge(username: String!): String!
  repositories: [Repository!]!
}

type Repository {
  name: String!
  deployments: [Deployment!]!
  resources: [Resource!]!
}

type Resource {
  type: String!
  id: String!
  inputs: JSON
  outputs: JSON
  owner: Deployment
  dependencies: [Resource!]!
}

type Subscription {
  deploymentLogs(deploymentId: String!, initialAmount: Int): Log!
}

type User {
  username: String!
  email: String!
  fullname: String
}
