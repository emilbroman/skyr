syntax = "proto3";

package scop.v1;

// Skyr Container Orchestrator Protocol (SCOP)
//
// This protocol defines communication between the container plugin and
// worker node agents (SCOC). The agent connects to the plugin and registers
// itself, then receives commands to manage pods and containers via CRI.

// The main SCOP service. Agents (SCOC) connect to this service running
// in the container plugin.
service ContainerOrchestrator {
  // Session opens a bidirectional stream between the agent and plugin.
  // The agent sends a NodeRegistration as the first message, then
  // receives commands from the plugin and sends back responses.
  rpc Session(stream AgentMessage) returns (stream PluginMessage);
}

// Messages sent from agent (SCOC) to plugin.
message AgentMessage {
  oneof message {
    NodeRegistration registration = 1;
    CommandResponse response = 2;
  }
}

// Initial registration message from agent to plugin.
message NodeRegistration {
  // Unique name for this node.
  string node_name = 1;
  // Labels for node selection/scheduling.
  map<string, string> labels = 2;
}

// Response to a command from the plugin.
message CommandResponse {
  // The request ID this response corresponds to.
  string request_id = 1;
  // The response payload.
  oneof result {
    // Success response.
    CommandSuccess success = 2;
    // Error response.
    CommandError error = 3;
  }
}

// Successful command result.
message CommandSuccess {
  oneof result {
    RunPodResponse run_pod = 1;
    StopPodResponse stop_pod = 2;
    RemovePodResponse remove_pod = 3;
    CreateContainerResponse create_container = 4;
    StartContainerResponse start_container = 5;
    StopContainerResponse stop_container = 6;
    RemoveContainerResponse remove_container = 7;
  }
}

// Error response.
message CommandError {
  string message = 1;
}

// Messages sent from plugin to agent (SCOC).
message PluginMessage {
  oneof message {
    // Acknowledgment of node registration.
    RegistrationAck registration_ack = 1;
    // Command to execute.
    Command command = 2;
  }
}

// Acknowledgment of successful registration.
message RegistrationAck {
  // Whether registration was successful.
  bool success = 1;
  // Error message if registration failed.
  string error = 2;
}

// A command from the plugin to execute on the node.
message Command {
  // Unique ID for this request (for correlating responses).
  string request_id = 1;
  // The command to execute.
  oneof command {
    RunPodRequest run_pod = 2;
    StopPodRequest stop_pod = 3;
    RemovePodRequest remove_pod = 4;
    CreateContainerRequest create_container = 5;
    StartContainerRequest start_container = 6;
    StopContainerRequest stop_container = 7;
    RemoveContainerRequest remove_container = 8;
  }
}

// ============================================================================
// Pod Messages
// ============================================================================

// Request to create and run a pod.
message RunPodRequest {
  PodConfig config = 1;
}

// Response from running a pod.
message RunPodResponse {
  // The ID of the created pod.
  string pod_id = 1;
}

// Request to stop a pod.
message StopPodRequest {
  string pod_id = 1;
}

// Response from stopping a pod.
message StopPodResponse {}

// Request to remove a pod.
message RemovePodRequest {
  string pod_id = 1;
}

// Response from removing a pod.
message RemovePodResponse {}

// Configuration for a pod.
message PodConfig {
  // Metadata for the pod.
  PodMetadata metadata = 1;
  // Labels for the pod.
  map<string, string> labels = 2;
  // Annotations for the pod.
  map<string, string> annotations = 3;
}

// Metadata for a pod.
message PodMetadata {
  // Name of the pod.
  string name = 1;
  // UID of the pod.
  string uid = 2;
  // Namespace of the pod.
  string namespace = 3;
}

// ============================================================================
// Container Messages
// ============================================================================

// Request to create a container in a pod.
message CreateContainerRequest {
  // ID of the pod to create the container in.
  string pod_id = 1;
  // Configuration for the container.
  ContainerConfig config = 2;
  // Configuration of the pod (for reference).
  PodConfig pod_config = 3;
}

// Response from creating a container.
message CreateContainerResponse {
  // The ID of the created container.
  string container_id = 1;
}

// Request to start a container.
message StartContainerRequest {
  string container_id = 1;
}

// Response from starting a container.
message StartContainerResponse {}

// Request to stop a container.
message StopContainerRequest {
  string container_id = 1;
  // Timeout in seconds before forcefully stopping.
  int64 timeout = 2;
}

// Response from stopping a container.
message StopContainerResponse {}

// Request to remove a container.
message RemoveContainerRequest {
  string container_id = 1;
}

// Response from removing a container.
message RemoveContainerResponse {}

// Configuration for a container.
message ContainerConfig {
  // Metadata for the container.
  ContainerMetadata metadata = 1;
  // Image to use.
  string image = 2;
  // Command to run (entrypoint).
  repeated string command = 3;
  // Arguments to the command.
  repeated string args = 4;
  // Environment variables.
  repeated KeyValue envs = 5;
  // Labels.
  map<string, string> labels = 6;
  // Annotations.
  map<string, string> annotations = 7;
}

// Metadata for a container.
message ContainerMetadata {
  // Name of the container.
  string name = 1;
}

// Key-value pair for environment variables.
message KeyValue {
  string key = 1;
  string value = 2;
}
