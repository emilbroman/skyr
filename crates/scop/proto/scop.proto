syntax = "proto3";

package scop.v1;

// Skyr Container Orchestrator Protocol (SCOP)
//
// This protocol defines communication between the container plugin and
// worker node conduits (SCOC). There are two services:
//
// 1. Orchestrator (served by container plugin):
//    - Conduits connect to register themselves and advertise their address
//    - Registration is persisted in the node registry for all plugin replicas
//
// 2. Conduit (served by SCOC):
//    - Plugin connects to execute pod/container operations
//    - Each operation is a first-class RPC

// ============================================================================
// Orchestrator Service (served by container plugin)
// ============================================================================

// The Orchestrator service handles node registration. Conduits (SCOC) connect
// to one of the container plugin replicas to register themselves.
service Orchestrator {
  // RegisterNode registers a conduit with the orchestrator.
  // The conduit advertises its address and resource capacity.
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);

  // Heartbeat keeps the node registration alive.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // UnregisterNode removes a node from the registry.
  rpc UnregisterNode(UnregisterNodeRequest) returns (UnregisterNodeResponse);

  // GetOverlayPeers retrieves the list of overlay peers for a node.
  rpc GetOverlayPeers(GetOverlayPeersRequest) returns (GetOverlayPeersResponse);
}

// Request to register a node with the orchestrator.
message RegisterNodeRequest {
  // Unique name for this node.
  string node_name = 1;
  // Address where the Conduit service is hosted (e.g., "http://node-1:50053").
  string conduit_address = 2;
  // Resource capacity available for container workloads.
  NodeCapacity capacity = 3;
  // Labels for node selection/scheduling.
  map<string, string> labels = 4;
  // Requested pod subnet prefix length (e.g., 24 for a /24).
  // The orchestrator allocates a subnet of this size from the cluster CIDR.
  uint32 pod_netmask = 5;
}

// Resource capacity of a node.
message NodeCapacity {
  // CPU capacity in millicores (e.g., 4000 = 4 cores).
  int64 cpu_millis = 1;
  // Memory capacity in bytes.
  int64 memory_bytes = 2;
  // Maximum number of pods this node can run.
  int32 max_pods = 3;
}

// Response to node registration.
message RegisterNodeResponse {
  // Whether registration was successful.
  bool success = 1;
  // Error message if registration failed.
  string error = 2;
  // Pod CIDR assigned to this node (e.g., "10.42.1.0/24").
  // The node uses this subnet for pod IP allocation.
  string pod_cidr = 3;
  // The cluster-wide CIDR for pod networking (e.g., "10.42.0.0/16").
  // Used by the node to distinguish cluster-internal traffic from internet
  // traffic when enforcing egress allow lists.
  string cluster_cidr = 4;
  // The service CIDR for Host VIPs (e.g., "10.43.0.0/16").
  // Traffic to this range is allowed through pod egress rules and handled
  // via DNAT rules installed by AddServiceRoute.
  string service_cidr = 5;
}

// Heartbeat request to keep registration alive.
message HeartbeatRequest {
  // Name of the node sending the heartbeat.
  string node_name = 1;
  // Current resource usage (optional).
  NodeUsage usage = 2;
}

// Current resource usage of a node.
message NodeUsage {
  // CPU usage in millicores.
  int64 cpu_millis = 1;
  // Memory usage in bytes.
  int64 memory_bytes = 2;
  // Current number of running pods.
  int32 running_pods = 3;
}

// Heartbeat response.
message HeartbeatResponse {
  // Whether the heartbeat was acknowledged.
  bool acknowledged = 1;
}

// Request to unregister a node.
message UnregisterNodeRequest {
  // Name of the node to unregister.
  string node_name = 1;
}

// Response to node unregistration.
message UnregisterNodeResponse {
  // Whether unregistration was successful.
  bool success = 1;
}

// Request to retrieve overlay peers for a node.
message GetOverlayPeersRequest {
  // Name of the requesting node.
  string node_name = 1;
}

// Response containing the list of overlay peers.
message GetOverlayPeersResponse {
  // The list of overlay peers (other nodes in the mesh).
  repeated OverlayPeer peers = 1;
}

// Information about an overlay peer (another node in the VXLAN mesh).
message OverlayPeer {
  // The peer's host IP for VXLAN tunneling.
  string peer_host_ip = 1;
}

// ============================================================================
// Conduit Service (served by SCOC)
// ============================================================================

// The Conduit service handles pod and container operations. The container
// plugin connects to conduits when it needs to execute operations on a node.
service Conduit {
  // CreatePod creates and starts a pod sandbox with all its containers.
  rpc CreatePod(CreatePodRequest) returns (CreatePodResponse);

  // RemovePod stops and removes a pod sandbox and all its containers.
  rpc RemovePod(RemovePodRequest) returns (RemovePodResponse);

  // AddAttachment opens an egress port on a pod's firewall.
  rpc AddAttachment(AddAttachmentRequest) returns (AddAttachmentResponse);

  // RemoveAttachment closes an egress port on a pod's firewall.
  rpc RemoveAttachment(RemoveAttachmentRequest) returns (RemoveAttachmentResponse);

  // AddOverlayPeer adds a VXLAN overlay peer for cross-node pod communication.
  rpc AddOverlayPeer(AddOverlayPeerRequest) returns (AddOverlayPeerResponse);

  // RemoveOverlayPeer removes a VXLAN overlay peer.
  rpc RemoveOverlayPeer(RemoveOverlayPeerRequest) returns (RemoveOverlayPeerResponse);

  // OpenPort opens an ingress firewall port on a pod.
  rpc OpenPort(OpenPortRequest) returns (OpenPortResponse);

  // ClosePort closes an ingress firewall port on a pod.
  rpc ClosePort(ClosePortRequest) returns (ClosePortResponse);

  // AddServiceRoute installs a DNAT rule for a Host.Port (VIP:port → backend pod:port).
  // Called on every node so that any pod can reach the VIP.
  rpc AddServiceRoute(AddServiceRouteRequest) returns (AddServiceRouteResponse);

  // RemoveServiceRoute removes a previously-installed DNAT rule.
  rpc RemoveServiceRoute(RemoveServiceRouteRequest) returns (RemoveServiceRouteResponse);

  // SetDnsRecord adds or updates a DNS record for a Host (hostname → VIP).
  rpc SetDnsRecord(SetDnsRecordRequest) returns (SetDnsRecordResponse);

  // RemoveDnsRecord removes a DNS record for a Host.
  rpc RemoveDnsRecord(RemoveDnsRecordRequest) returns (RemoveDnsRecordResponse);

  // ConfigureServiceCidr tells the node about the service CIDR range
  // so it can be added as an allowed range in the bridge forwarding rules.
  rpc ConfigureServiceCidr(ConfigureServiceCidrRequest) returns (ConfigureServiceCidrResponse);

  // AddVip adds a virtual IP address to the node's primary network interface,
  // sends gratuitous ARP announcements, and installs a DNAT rule forwarding
  // traffic destined for the VIP to a cluster-internal destination IP.
  rpc AddVip(AddVipRequest) returns (AddVipResponse);

  // RemoveVip removes a previously-added virtual IP and its associated DNAT rule.
  rpc RemoveVip(RemoveVipRequest) returns (RemoveVipResponse);

  // PortForward establishes a bidirectional TCP tunnel to a pod's port.
  // The first request message must contain a PortForwardInit specifying the
  // target pod and port. Subsequent messages carry raw TCP data.
  rpc PortForward(stream PortForwardRequest) returns (stream PortForwardResponse);
}

// ============================================================================
// Pod Messages
// ============================================================================

// Request to create a pod.
message CreatePodRequest {
  PodConfig config = 1;
}

// Response from creating a pod.
message CreatePodResponse {
  // The ID of the created pod.
  string pod_id = 1;
  // The pod's IP address (e.g., "10.42.1.2").
  string address = 2;
}

// Request to remove a pod.
message RemovePodRequest {
  string pod_name = 1;
}

// Response from removing a pod.
message RemovePodResponse {}

// Configuration for a pod.
message PodConfig {
  // Environment QID (e.g., "MyOrg/MyRepo::main").
  string environment_qid = 1;
  // Full resource name (user name + inputs hash).
  string name = 2;
  // Reserved: uid (was field 3), allowed_destinations (was field 4).
  reserved 3, 4;
  // Containers to create within this pod.
  repeated ContainerConfig containers = 5;
}

// ============================================================================
// Container Messages
// ============================================================================

// Configuration for a container within a pod.
// Containers are identified by their index in the pod's container list.
message ContainerConfig {
  // Reserved: name (was field 1). Containers are identified by index.
  reserved 1;
  // Image to use.
  string image = 2;
  // Command to run (entrypoint).
  repeated string command = 3;
  // Arguments to the command.
  repeated string args = 4;
  // Environment variables.
  repeated KeyValue envs = 5;
}

// ============================================================================
// Attachment Messages
// ============================================================================

// Request to open an egress port on a pod's firewall.
message AddAttachmentRequest {
  // Full resource name (name + hash).
  string pod_name = 1;
  // IP address of the destination.
  string destination_address = 2;
  // Port number.
  int32 port = 3;
  // Protocol: "tcp" or "udp".
  string protocol = 4;
}

// Response from adding an attachment.
message AddAttachmentResponse {}

// Request to close an egress port on a pod's firewall.
message RemoveAttachmentRequest {
  // Full resource name (name + hash).
  string pod_name = 1;
  // IP address of the destination.
  string destination_address = 2;
  // Port number.
  int32 port = 3;
  // Protocol: "tcp" or "udp".
  string protocol = 4;
}

// Response from removing an attachment.
message RemoveAttachmentResponse {}

// Key-value pair for environment variables.
message KeyValue {
  string key = 1;
  string value = 2;
}

// ============================================================================
// Overlay Network Messages
// ============================================================================

// Request to add a VXLAN overlay peer.
message AddOverlayPeerRequest {
  // The remote node's underlay IP address for VXLAN tunneling.
  string peer_host_ip = 1;
}

// Response from adding an overlay peer.
message AddOverlayPeerResponse {}

// Request to remove a VXLAN overlay peer.
message RemoveOverlayPeerRequest {
  // The remote node's underlay IP address.
  string peer_host_ip = 1;
}

// Response from removing an overlay peer.
message RemoveOverlayPeerResponse {}

// Request to open an ingress firewall port on a pod.
message OpenPortRequest {
  // Full resource name (name + hash).
  string pod_name = 1;
  // The port number to open.
  int32 port = 2;
  // The protocol: "tcp" or "udp".
  string protocol = 3;
}

// Response from opening a port.
message OpenPortResponse {}

// Request to close an ingress firewall port on a pod.
message ClosePortRequest {
  // Full resource name (name + hash).
  string pod_name = 1;
  // The port number to close.
  int32 port = 2;
  // The protocol: "tcp" or "udp".
  string protocol = 3;
}

// Response from closing a port.
message ClosePortResponse {}

// ============================================================================
// Service Route Messages (Host.Port load balancing)
// ============================================================================

// A backend target for load-balanced traffic.
message ServiceBackend {
  // IP address of the backend pod.
  string address = 1;
  // Port number on the backend pod.
  int32 port = 2;
  // Protocol: "tcp" or "udp".
  string protocol = 3;
}

// Request to add a DNAT service route on this node.
message AddServiceRouteRequest {
  // The virtual IP (VIP) of the Host.
  string vip = 1;
  // The port on the VIP to route.
  int32 port = 2;
  // The protocol: "tcp" or "udp".
  string protocol = 3;
  // Backend pod ports to load-balance across.
  repeated ServiceBackend backends = 4;
}

// Response from adding a service route.
message AddServiceRouteResponse {}

// Request to remove a DNAT service route from this node.
message RemoveServiceRouteRequest {
  // The virtual IP (VIP) of the Host.
  string vip = 1;
  // The port on the VIP.
  int32 port = 2;
  // The protocol: "tcp" or "udp".
  string protocol = 3;
}

// Response from removing a service route.
message RemoveServiceRouteResponse {}

// ============================================================================
// DNS Messages (Host name resolution)
// ============================================================================

// Request to set a DNS record on this node.
message SetDnsRecordRequest {
  // The hostname (e.g., "web-api.internal").
  string hostname = 1;
  // The IP address to resolve to (VIP).
  string address = 2;
}

// Response from setting a DNS record.
message SetDnsRecordResponse {}

// Request to remove a DNS record from this node.
message RemoveDnsRecordRequest {
  // The hostname to remove.
  string hostname = 1;
}

// Response from removing a DNS record.
message RemoveDnsRecordResponse {}

// ============================================================================
// Service CIDR Configuration
// ============================================================================

// Request to configure the service CIDR on this node.
message ConfigureServiceCidrRequest {
  // The service CIDR range (e.g., "10.43.0.0/16").
  string service_cidr = 1;
}

// Response from configuring the service CIDR.
message ConfigureServiceCidrResponse {}

// ============================================================================
// VIP Messages (Internet Address exposure)
// ============================================================================

// Request to add a virtual IP address to this node.
// The node adds the address to its primary interface, sends gratuitous ARP,
// and installs a DNAT rule forwarding all traffic to the destination IP.
message AddVipRequest {
  // The virtual IP address to add (e.g., "10.20.2.64").
  string address = 1;
  // The cluster-internal destination IP to DNAT traffic to (e.g., a Host VIP).
  string destination = 2;
}

// Response from adding a VIP.
message AddVipResponse {}

// Request to remove a virtual IP address from this node.
message RemoveVipRequest {
  // The virtual IP address to remove.
  string address = 1;
}

// Response from removing a VIP.
message RemoveVipResponse {}

// ============================================================================
// Port Forwarding Messages
// ============================================================================

// Request message for the PortForward streaming RPC.
// The first message must contain an `init` payload; subsequent messages carry
// raw TCP data from the client to the pod.
message PortForwardRequest {
  oneof payload {
    // Initialization message (must be the first message on the stream).
    PortForwardInit init = 1;
    // Raw TCP data from the client destined for the pod.
    bytes data = 2;
  }
}

// Initialization parameters for a port-forward session.
message PortForwardInit {
  // Full resource name (name + hash) of the pod.
  string pod_name = 1;
  // The port number to forward to on the pod.
  int32 port = 2;
  // The protocol: "tcp" (only TCP is supported for port-forwarding).
  string protocol = 3;
}

// Response message for the PortForward streaming RPC.
// Each message carries raw TCP data from the pod back to the client.
message PortForwardResponse {
  // Raw TCP data from the pod destined for the client.
  bytes data = 1;
}
