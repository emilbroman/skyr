syntax = "proto3";

package scop.v1;

// Skyr Container Orchestrator Protocol (SCOP)
//
// This protocol defines communication between the container plugin and
// worker node conduits (SCOC). There are two services:
//
// 1. Orchestrator (served by container plugin):
//    - Conduits connect to register themselves and advertise their address
//    - Registration is persisted in the node registry for all plugin replicas
//
// 2. Conduit (served by SCOC):
//    - Plugin connects to execute pod/container operations
//    - Each operation is a first-class RPC

// ============================================================================
// Orchestrator Service (served by container plugin)
// ============================================================================

// The Orchestrator service handles node registration. Conduits (SCOC) connect
// to one of the container plugin replicas to register themselves.
service Orchestrator {
  // RegisterNode registers a conduit with the orchestrator.
  // The conduit advertises its address and resource capacity.
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);

  // Heartbeat keeps the node registration alive.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // UnregisterNode removes a node from the registry.
  rpc UnregisterNode(UnregisterNodeRequest) returns (UnregisterNodeResponse);
}

// Request to register a node with the orchestrator.
message RegisterNodeRequest {
  // Unique name for this node.
  string node_name = 1;
  // Address where the Conduit service is hosted (e.g., "http://node-1:50053").
  string conduit_address = 2;
  // Resource capacity available for container workloads.
  NodeCapacity capacity = 3;
  // Labels for node selection/scheduling.
  map<string, string> labels = 4;
  // Requested pod subnet prefix length (e.g., 24 for a /24).
  // The orchestrator allocates a subnet of this size from the cluster CIDR.
  uint32 pod_netmask = 5;
}

// Resource capacity of a node.
message NodeCapacity {
  // CPU capacity in millicores (e.g., 4000 = 4 cores).
  int64 cpu_millis = 1;
  // Memory capacity in bytes.
  int64 memory_bytes = 2;
  // Maximum number of pods this node can run.
  int32 max_pods = 3;
}

// Response to node registration.
message RegisterNodeResponse {
  // Whether registration was successful.
  bool success = 1;
  // Error message if registration failed.
  string error = 2;
  // Pod CIDR assigned to this node (e.g., "10.42.1.0/24").
  // The node uses this subnet for pod IP allocation.
  string pod_cidr = 3;
  // The cluster-wide CIDR for pod networking (e.g., "10.42.0.0/16").
  // Used by the node to distinguish cluster-internal traffic from internet
  // traffic when enforcing egress allow lists.
  string cluster_cidr = 4;
}

// Heartbeat request to keep registration alive.
message HeartbeatRequest {
  // Name of the node sending the heartbeat.
  string node_name = 1;
  // Current resource usage (optional).
  NodeUsage usage = 2;
}

// Current resource usage of a node.
message NodeUsage {
  // CPU usage in millicores.
  int64 cpu_millis = 1;
  // Memory usage in bytes.
  int64 memory_bytes = 2;
  // Current number of running pods.
  int32 running_pods = 3;
}

// Heartbeat response.
message HeartbeatResponse {
  // Whether the heartbeat was acknowledged.
  bool acknowledged = 1;
}

// Request to unregister a node.
message UnregisterNodeRequest {
  // Name of the node to unregister.
  string node_name = 1;
}

// Response to node unregistration.
message UnregisterNodeResponse {
  // Whether unregistration was successful.
  bool success = 1;
}

// ============================================================================
// Conduit Service (served by SCOC)
// ============================================================================

// The Conduit service handles pod and container operations. The container
// plugin connects to conduits when it needs to execute operations on a node.
service Conduit {
  // CreatePod creates and starts a pod sandbox.
  rpc CreatePod(CreatePodRequest) returns (CreatePodResponse);

  // RemovePod stops and removes a pod sandbox.
  rpc RemovePod(RemovePodRequest) returns (RemovePodResponse);

  // CreateContainer creates a container within a pod.
  rpc CreateContainer(CreateContainerRequest) returns (CreateContainerResponse);

  // StartContainer starts a created container.
  rpc StartContainer(StartContainerRequest) returns (StartContainerResponse);

  // StopContainer stops a running container.
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);

  // RemoveContainer removes a container.
  rpc RemoveContainer(RemoveContainerRequest) returns (RemoveContainerResponse);

  // AddOverlayPeer adds a VXLAN overlay peer for cross-node pod communication.
  rpc AddOverlayPeer(AddOverlayPeerRequest) returns (AddOverlayPeerResponse);

  // RemoveOverlayPeer removes a VXLAN overlay peer.
  rpc RemoveOverlayPeer(RemoveOverlayPeerRequest) returns (RemoveOverlayPeerResponse);

  // OpenPort opens an ingress firewall port on a pod.
  rpc OpenPort(OpenPortRequest) returns (OpenPortResponse);

  // ClosePort closes an ingress firewall port on a pod.
  rpc ClosePort(ClosePortRequest) returns (ClosePortResponse);
}

// ============================================================================
// Pod Messages
// ============================================================================

// Request to create a pod.
message CreatePodRequest {
  PodConfig config = 1;
}

// Response from creating a pod.
message CreatePodResponse {
  // The ID of the created pod.
  string pod_id = 1;
  // The pod's IP address (e.g., "10.42.1.2").
  string address = 2;
}

// Request to remove a pod.
message RemovePodRequest {
  string pod_id = 1;
}

// Response from removing a pod.
message RemovePodResponse {}

// Configuration for a pod.
message PodConfig {
  // Environment QID (e.g., "MyOrg/MyRepo::main").
  string environment_qid = 1;
  // Pod name.
  string name = 2;
  // Pod UID.
  string uid = 3;
  // Network destinations this pod is allowed to reach (egress allow list).
  // Each entry represents a port resource that this pod can connect to.
  repeated AllowedDestination allowed_destinations = 4;
}

// A network destination that a pod is allowed to reach.
// Corresponds to a Pod.Port resource output.
message AllowedDestination {
  // IP address of the destination pod.
  string address = 1;
  // Port number.
  int32 port = 2;
  // Protocol: "tcp" or "udp".
  string protocol = 3;
}

// ============================================================================
// Container Messages
// ============================================================================

// Request to create a container in a pod.
message CreateContainerRequest {
  // ID of the pod to create the container in.
  string pod_id = 1;
  // Configuration for the container.
  ContainerConfig config = 2;
  // Configuration of the pod (for reference).
  PodConfig pod_config = 3;
}

// Response from creating a container.
message CreateContainerResponse {
  // The ID of the created container.
  string container_id = 1;
}

// Request to start a container.
message StartContainerRequest {
  string container_id = 1;
}

// Response from starting a container.
message StartContainerResponse {}

// Request to stop a container.
message StopContainerRequest {
  string container_id = 1;
  // Timeout in seconds before forcefully stopping.
  int64 timeout = 2;
}

// Response from stopping a container.
message StopContainerResponse {}

// Request to remove a container.
message RemoveContainerRequest {
  string container_id = 1;
}

// Response from removing a container.
message RemoveContainerResponse {}

// Configuration for a container.
message ContainerConfig {
  // Container name.
  string name = 1;
  // Image to use.
  string image = 2;
  // Command to run (entrypoint).
  repeated string command = 3;
  // Arguments to the command.
  repeated string args = 4;
  // Environment variables.
  repeated KeyValue envs = 5;
}

// Key-value pair for environment variables.
message KeyValue {
  string key = 1;
  string value = 2;
}

// ============================================================================
// Overlay Network Messages
// ============================================================================

// Request to add a VXLAN overlay peer.
message AddOverlayPeerRequest {
  // The remote node's underlay IP address for VXLAN tunneling.
  string peer_host_ip = 1;
}

// Response from adding an overlay peer.
message AddOverlayPeerResponse {}

// Request to remove a VXLAN overlay peer.
message RemoveOverlayPeerRequest {
  // The remote node's underlay IP address.
  string peer_host_ip = 1;
}

// Response from removing an overlay peer.
message RemoveOverlayPeerResponse {}

// Request to open an ingress firewall port on a pod.
message OpenPortRequest {
  // The pod identifier.
  string pod_id = 1;
  // The port number to open.
  int32 port = 2;
  // The protocol: "tcp" or "udp".
  string protocol = 3;
}

// Response from opening a port.
message OpenPortResponse {}

// Request to close an ingress firewall port on a pod.
message ClosePortRequest {
  // The pod identifier.
  string pod_id = 1;
  // The port number to close.
  int32 port = 2;
  // The protocol: "tcp" or "udp".
  string protocol = 3;
}

// Response from closing a port.
message ClosePortResponse {}
