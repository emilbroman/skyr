services:
  scylla:
    image: scylladb/scylla
    ports:
      - 9042:9042
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - 15672:15672
      - 5672:5672
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:8-alpine
    ports:
      - 6379:6379
    restart: unless-stopped

  api:
    image: skyr:latest
    entrypoint: ["/api"]
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--udb-hostname",
        "redis",
        "--challenge-salt",
        "local-dev-challenge-salt",
      ]
    restart: unless-stopped
    ports:
      - 8080:8080

  scs:
    image: skyr:latest
    entrypoint: ["/scs"]
    command:
      [
        "daemon",
        "--address",
        "0.0.0.0:2222",
        "--key",
        "/host.pem",
        "--db-hostname",
        "scylla",
        "--udb-hostname",
        "redis",
      ]
    restart: unless-stopped
    ports:
      - 2222:2222
    volumes:
      - ./host.pem:/host.pem:ro

  de:
    image: skyr:latest
    entrypoint: ["/de"]
    command: ["daemon", "--db-hostname", "scylla", "--mq-hostname", "rabbitmq"]
    restart: unless-stopped

  plugin-std-random:
    image: skyr:latest
    entrypoint: ["/plugin_std_random"]
    command: ["--bind", "tcp://0.0.0.0:50051"]
    restart: unless-stopped

  rte-0:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--db-hostname",
        "scylla",
        "--mq-hostname",
        "rabbitmq",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--worker-index",
        "0",
        "--worker-count",
        "3",
      ]
    restart: unless-stopped

  rte-1:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--db-hostname",
        "scylla",
        "--mq-hostname",
        "rabbitmq",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--worker-index",
        "1",
        "--worker-count",
        "3",
      ]
    restart: unless-stopped

  rte-2:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--db-hostname",
        "scylla",
        "--mq-hostname",
        "rabbitmq",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--worker-index",
        "2",
        "--worker-count",
        "3",
      ]
    restart: unless-stopped
