services:
  scylla:
    image: scylladb/scylla
    ports:
      - 9042:9042
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - 15672:15672
      - 5672:5672
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:8-alpine
    ports:
      - 6379:6379
    restart: always

  redpanda:
    image: redpandadata/redpanda:v25.3.7
    command:
      [
        "redpanda",
        "start",
        "--kafka-addr",
        "internal://0.0.0.0:9092",
        "--advertise-kafka-addr",
        "internal://redpanda:9092",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--check=false",
      ]
    ports:
      - 9092:9092
    restart: always

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    restart: always

  oci-registry:
    image: registry:2
    ports:
      - 5000:5000
    restart: always

  api:
    image: skyr:latest
    entrypoint: ["/api"]
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--cdb-hostname",
        "scylla",
        "--rdb-hostname",
        "scylla",
        "--udb-hostname",
        "redis",
        "--ldb-hostname",
        "redpanda",
        "--adb-endpoint-url",
        "http://minio:9000",
        "--adb-presign-endpoint-url",
        "http://localhost:9000",
        "--adb-bucket",
        "skyr-artifacts",
        "--adb-access-key-id",
        "minioadmin",
        "--adb-secret-access-key",
        "minioadmin",
        "--challenge-salt",
        "local-dev-challenge-salt",
      ]
    restart: always
    ports:
      - 8080:8080

  scs:
    image: skyr:latest
    entrypoint: ["/scs"]
    command:
      [
        "daemon",
        "--address",
        "0.0.0.0:2222",
        "--key",
        "/host.pem",
        "--cdb-hostname",
        "scylla",
        "--udb-hostname",
        "redis",
      ]
    restart: always
    ports:
      - 2222:2222
    volumes:
      - ./host.pem:/host.pem:ro

  de:
    image: skyr:latest
    entrypoint: ["/de"]
    command:
      [
        "daemon",
        "--cdb-hostname",
        "scylla",
        "--rdb-hostname",
        "scylla",
        "--rtq-hostname",
        "rabbitmq",
        "--ldb-hostname",
        "redpanda",
      ]
    restart: always

  plugin-std-random:
    image: skyr:latest
    entrypoint: ["/plugin_std_random"]
    command: ["--bind", "tcp://0.0.0.0:50051"]
    restart: always

  plugin-std-artifact:
    image: skyr:latest
    entrypoint: ["/plugin_std_artifact"]
    command:
      [
        "--bind",
        "tcp://0.0.0.0:50052",
        "--adb-endpoint-url",
        "http://minio:9000",
        "--adb-bucket",
        "skyr-artifacts",
        "--adb-access-key-id",
        "minioadmin",
        "--adb-secret-access-key",
        "minioadmin",
      ]
    restart: always

  plugin-std-container:
    image: skyr:latest
    entrypoint: ["/plugin_std_container"]
    command:
      [
        "--bind",
        "0.0.0.0:50053",
        "--rtp-bind",
        "tcp://0.0.0.0:50054",
        "--node-registry-hostname",
        "redis",
        "--cdb-hostnames",
        "scylla:9042",
        "--buildkit-addr",
        "tcp://host.containers.internal:1234",
        "--registry-url",
        "http://oci-registry:5000",
      ]
    restart: always
    ports:
      - "50053:50053"
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - tmpfs:/tmp

  rte-0:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--rdb-hostname",
        "scylla",
        "--rtq-hostname",
        "rabbitmq",
        "--ldb-hostname",
        "redpanda",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--plugin",
        "Std/Artifact@tcp://plugin-std-artifact:50052",
        "--plugin",
        "Std/Container@tcp://plugin-std-container:50054",
        "--worker-index",
        "0",
        "--worker-count",
        "3",
      ]
    restart: always

  rte-1:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--rdb-hostname",
        "scylla",
        "--rtq-hostname",
        "rabbitmq",
        "--ldb-hostname",
        "redpanda",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--plugin",
        "Std/Artifact@tcp://plugin-std-artifact:50052",
        "--plugin",
        "Std/Container@tcp://plugin-std-container:50054",
        "--worker-index",
        "1",
        "--worker-count",
        "3",
      ]
    restart: always

  rte-2:
    image: skyr:latest
    entrypoint: ["/rte"]
    command:
      [
        "daemon",
        "--rdb-hostname",
        "scylla",
        "--rtq-hostname",
        "rabbitmq",
        "--ldb-hostname",
        "redpanda",
        "--plugin",
        "Std/Random@tcp://plugin-std-random:50051",
        "--plugin",
        "Std/Artifact@tcp://plugin-std-artifact:50052",
        "--plugin",
        "Std/Container@tcp://plugin-std-container:50054",
        "--worker-index",
        "2",
        "--worker-count",
        "3",
      ]
    restart: always

volumes:
  tmpfs:
