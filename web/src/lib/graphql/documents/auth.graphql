query AuthChallenge($username: String!, $region: String) {
  authChallenge(username: $username, region: $region) {
    challenge
    taken
    passkeyRegistration
    passkeySignin
  }
}

mutation SignIn($username: String!, $proof: JSON!) {
  signin(username: $username, proof: $proof) {
    user {
      username
      email
      fullname
      region
      publicKeys
    }
    token
  }
}

mutation Signup($username: String!, $email: String!, $proof: JSON!, $region: String!, $fullname: String) {
  signup(username: $username, email: $email, proof: $proof, region: $region, fullname: $fullname) {
    user {
      username
      email
      fullname
      region
      publicKeys
    }
    token
  }
}

query RefreshToken {
  refreshToken {
    user {
      username
      email
      fullname
      region
      publicKeys
    }
    token
  }
}

query Me {
  me {
    username
    email
    fullname
    region
    publicKeys
  }
}
