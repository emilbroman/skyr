query AuthChallenge($username: String!) {
  authChallenge(username: $username) {
    challenge
    taken
    passkeyRegistration
    passkeySignin
  }
}

mutation SignIn($username: String!, $proof: JSON!) {
  signin(username: $username, proof: $proof) {
    user {
      username
      email
      fullname
      publicKeys
    }
    token
  }
}

mutation Signup($username: String!, $email: String!, $proof: JSON!) {
  signup(username: $username, email: $email, proof: $proof) {
    user {
      username
      email
      fullname
      publicKeys
    }
    token
  }
}

query RefreshToken {
  refreshToken {
    user {
      username
      email
      fullname
      publicKeys
    }
    token
  }
}

query Me {
  me {
    username
    email
    fullname
    publicKeys
  }
}
