query EnvironmentDetail($org: String!, $repo: String!, $env: String!) {
  organization(name: $org) {
    repository(name: $repo) {
      environment(name: $env) {
        name
        qid
        incidents {
          id
          closedAt
        }
        deployments {
          id
          shortId
          commit {
            hash
            message
          }
          createdAt
          state
          bootstrapped
          status {
            health
            lastReportAt
            lastReportSucceeded
            openIncidentCount
            consecutiveFailureCount
          }
          resources {
            type
            name
            inputs
            outputs
            markers
            sourceTrace {
              moduleId
              span
              name
            }
          }
          lastLogs(amount: 20) {
            severity
            timestamp
            message
          }
        }
        artifacts {
          name
          mediaType
          url
        }
        resources {
          type
          name
          inputs
          outputs
          owner {
            id
          }
          dependencies {
            type
            name
          }
          markers
          sourceTrace {
            moduleId
            span
            name
          }
          status {
            health
            lastReportAt
            lastReportSucceeded
            openIncidentCount
            consecutiveFailureCount
          }
        }
      }
    }
  }
}

query ResourceDetail(
  $org: String!
  $repo: String!
  $env: String!
  $resourceId: String!
) {
  organization(name: $org) {
    repository(name: $repo) {
      environment(name: $env) {
        qid
        resource(id: $resourceId) {
          type
          name
          inputs
          outputs
          markers
          owner {
            id
            shortId
            commit {
              hash
              message
            }
            createdAt
            state
            bootstrapped
          }
          dependencies {
            type
            name
          }
          sourceTrace {
            moduleId
            span
            name
          }
          status {
            health
            lastReportAt
            lastReportSucceeded
            openIncidentCount
            consecutiveFailureCount
          }
          openIncidents {
            id
            openedAt
            lastReportAt
            reportCount
            summary
          }
        }
      }
    }
  }
}

mutation CreateDeployment(
  $org: String!
  $repo: String!
  $env: String!
  $commitHash: String!
) {
  createDeployment(
    organization: $org
    repository: $repo
    environment: $env
    commitHash: $commitHash
  ) {
    id
    state
  }
}

mutation TearDownEnvironment($org: String!, $repo: String!, $env: String!) {
  tearDownEnvironment(organization: $org, repository: $repo, environment: $env)
}

mutation DeleteResource(
  $org: String!
  $repo: String!
  $env: String!
  $resource: String!
) {
  deleteResource(
    organization: $org
    repository: $repo
    environment: $env
    resource: $resource
  )
}

query DeploymentDetail(
  $org: String!
  $repo: String!
  $env: String!
  $id: String!
) {
  organization(name: $org) {
    repository(name: $repo) {
      environment(name: $env) {
        deployment(id: $id) {
          id
          shortId
          qid
          commit {
            hash
            message
          }
          createdAt
          state
          bootstrapped
          status {
            health
            lastReportAt
            lastReportSucceeded
            openIncidentCount
            consecutiveFailureCount
          }
          openIncidents {
            id
            openedAt
            lastReportAt
            reportCount
            summary
          }
          resources {
            type
            name
            inputs
            outputs
            owner {
              id
            }
            dependencies {
              type
              name
            }
            markers
            sourceTrace {
              moduleId
              span
              name
            }
            status {
              health
              openIncidentCount
            }
          }
          lastLogs(amount: 20) {
            severity
            timestamp
            message
          }
        }
      }
    }
  }
}
