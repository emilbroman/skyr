query EnvironmentIncidents($org: String!, $repo: String!, $env: String!) {
  organization(name: $org) {
    repository(name: $repo) {
      environment(name: $env) {
        name
        qid
        incidents {
          id
          openedAt
          closedAt
          lastReportAt
          reportCount
          summary
          entity {
            qid
            ... on Resource {
              type
              name
            }
            ... on Deployment {
              id
              ref
              commit {
                hash
              }
            }
          }
        }
      }
    }
  }
}

query EnvironmentIncidentDetail(
  $org: String!
  $repo: String!
  $env: String!
  $id: ID!
) {
  organization(name: $org) {
    repository(name: $repo) {
      environment(name: $env) {
        name
        qid
        incident(id: $id) {
          id
          openedAt
          closedAt
          lastReportAt
          reportCount
          summary
          entity {
            qid
            ... on Resource {
              type
              name
            }
            ... on Deployment {
              id
              ref
              commit {
                hash
                message
              }
            }
          }
        }
      }
    }
  }
}
