mutation CreateRepository(
    $organization: String!
    $repository: String!
    $region: String
) {
    createRepository(
        organization: $organization
        repository: $repository
        region: $region
    ) {
        name
    }
}

query RepositoryDetail($org: String!, $repo: String!) {
  organization(name: $org) {
    repository(name: $repo) {
      name
      organization {
        name
      }
      environments {
        name
        qid
        resources {
          name
        }
        deployments {
          id
          shortId
          state
          commit {
            hash
            message
          }
        }
      }
    }
  }
}
