query Organizations {
  organizations {
    name
    members {
      username
      fullname
    }
    repositories {
      name
    }
  }
}

query OrganizationDetail($org: String!) {
  organization(name: $org) {
    name
    members {
      username
      fullname
    }
    repositories {
      name
      environments {
        name
        qid
        currentDeployment: deployment {
          id
          state
          status {
            health
            openIncidentCount
          }
          openIncidents {
            id
            openedAt
            lastReportAt
            reportCount
            summary
          }
        }
        deployments {
          id
          shortId
          state
          commit {
            hash
            message
          }
        }
      }
    }
  }
}

mutation CreateOrganization($name: String!, $region: String) {
  createOrganization(name: $name, region: $region) {
    name
  }
}

mutation AddOrganizationMember($organization: String!, $username: String!) {
  addOrganizationMember(organization: $organization, username: $username) {
    name
    members {
      username
      fullname
    }
  }
}
