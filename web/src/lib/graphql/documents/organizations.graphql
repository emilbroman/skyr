query Organizations {
  organizations {
    name
    repositories {
      name
    }
  }
}

query OrganizationDetail($org: String!) {
  organization(name: $org) {
    name
    repositories {
      name
      environments {
        name
        qid
        deployments {
          id
          ref
          state
          commit {
            hash
            message
          }
        }
      }
    }
  }
}
