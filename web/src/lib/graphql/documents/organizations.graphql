query Organizations {
  organizations {
    name
    members {
      username
    }
    repositories {
      name
    }
  }
}

query OrganizationDetail($org: String!) {
  organization(name: $org) {
    name
    members {
      username
    }
    repositories {
      name
      environments {
        name
        qid
        deployments {
          id
          shortId
          state
          commit {
            hash
            message
          }
        }
      }
    }
  }
}

mutation CreateOrganization($name: String!) {
  createOrganization(name: $name) {
    name
  }
}

mutation AddOrganizationMember($organization: String!, $username: String!) {
  addOrganizationMember(organization: $organization, username: $username) {
    name
    members {
      username
    }
  }
}
