query CommitTreeEntry(
  $org: String!
  $repo: String!
  $commit: String!
  $path: String!
) {
  organization(name: $org) {
    repository(name: $repo) {
      commit(hash: $commit) {
        hash
        message
        parents {
          hash
        }
        treeEntry(path: $path) {
          ... on Tree {
            __typename
            hash
            name
            entries {
              ... on Tree {
                __typename
                hash
                name
              }
              ... on Blob {
                __typename
                hash
                name
                size
              }
            }
          }
          ... on Blob {
            __typename
            hash
            name
            size
            content
          }
        }
      }
    }
  }
}

query CommitRootTree($org: String!, $repo: String!, $commit: String!) {
  organization(name: $org) {
    repository(name: $repo) {
      commit(hash: $commit) {
        hash
        message
        parents {
          hash
        }
        tree {
          hash
          entries {
            ... on Tree {
              __typename
              hash
              name
            }
            ... on Blob {
              __typename
              hash
              name
              size
            }
          }
        }
      }
    }
  }
}

query CommitPageEnvironments($org: String!, $repo: String!) {
  organization(name: $org) {
    repository(name: $repo) {
      environments {
        name
      }
    }
  }
}
