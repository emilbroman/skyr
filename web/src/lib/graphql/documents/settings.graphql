query UserSettings {
    me {
        username
        email
        fullname
        publicKeys
    }
}

mutation UpdateFullname($fullname: String!) {
    updateFullname(fullname: $fullname) {
        username
        email
        fullname
    }
}

mutation AddPublicKey($proof: JSON!) {
    addPublicKey(proof: $proof) {
        username
        email
        fullname
        publicKeys
    }
}

mutation RemovePublicKey($fingerprint: String!) {
    removePublicKey(fingerprint: $fingerprint) {
        username
        email
        fullname
        publicKeys
    }
}
